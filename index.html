<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inventario - Centro de Acopio</title>
    <!-- Tailwind CSS para un diseño limpio y moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold text-blue-800">Centro de Acopio</h1>
            <p class="text-gray-600 mt-2">Control de Inventario en Tiempo Real</p>
        </header>

        <!-- Sección de Resumen y Tablas -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-semibold text-gray-800">Inventario Disponible</h2>
                <button onclick="cargarInventario()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition">
                    🔄 Actualizar
                </button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Código</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Producto</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Presentación</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Categoría</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Entradas</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Salidas</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Stock</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-inventario" class="bg-white divide-y divide-gray-200">
                        <tr>
                            <td colspan="7" class="px-6 py-4 text-center text-gray-500">Cargando inventario...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Formularios de Operaciones -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Registrar Entrada -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h3 class="text-xl font-bold text-green-700 mb-4">📥 Registrar Entrada</h3>
                <form id="form-entrada" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Código del Producto</label>
                        <input type="text" id="ent-codigo" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 p-2 border">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Cantidad</label>
                        <input type="number" id="ent-cantidad" required min="1" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 p-2 border">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Donante</label>
                        <input type="text" id="ent-donante" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 p-2 border">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Registrado Por</label>
                        <input type="text" id="ent-responsable" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 p-2 border">
                    </div>
                    <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition">
                        Guardar Entrada
                    </button>
                </form>
            </div>

            <!-- Registrar Salida -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h3 class="text-xl font-bold text-red-700 mb-4">📤 Registrar Salida</h3>
                <form id="form-salida" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Código del Producto</label>
                        <input type="text" id="sal-codigo" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-red-500 focus:ring-red-500 p-2 border">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Cantidad</label>
                        <input type="number" id="sal-cantidad" required min="1" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-red-500 focus:ring-red-500 p-2 border">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Destinatario</label>
                        <input type="text" id="sal-destinatario" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-red-500 focus:ring-red-500 p-2 border">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Autorizado Por</label>
                        <input type="text" id="sal-responsable" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-red-500 focus:ring-red-500 p-2 border">
                    </div>
                    <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded transition">
                        Guardar Salida
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Script de Integración con el Backend -->
    <script>
        // Apunta automáticamente a la misma URL pública donde se hospeda el backend
        const API_URL = window.location.origin + "/api";

        async function cargarInventario() {
            try {
                const response = await fetch(`${API_URL}/inventario`);
                const data = await response.json();
                const tbody = document.getElementById('tabla-inventario');
                tbody.innerHTML = '';

                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-4 text-center text-gray-500">No hay productos registrados.</td></tr>`;
                    return;
                }

                data.forEach(prod => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-gray-50";
                    tr.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${prod.codigo}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${prod.nombre}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${prod.presentacion || '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500"><span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800">${prod.categoria}</span></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-green-600 font-semibold">${prod.total_entradas}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-red-600 font-semibold">${prod.total_salidas}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-bold ${prod.stock_disponible > 0 ? 'text-gray-900' : 'text-red-500'}">${prod.stock_disponible}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error("Error cargando inventario:", error);
            }
        }

        function obtenerFechaActual() {
            const d = new Date();
            return `${d.getDate().toString().padStart(2, '0')}/${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getFullYear()}`;
        }

        // Evento Registrar Entrada
        document.getElementById('form-entrada').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                fecha: obtenerFechaActual(),
                codigo: document.getElementById('ent-codigo').value,
                cantidad: parseInt(document.getElementById('ent-cantidad').value),
                persona_contacto: document.getElementById('ent-donante').value,
                responsable: document.getElementById('ent-responsable').value
            };

            const res = await fetch(`${API_URL}/entradas`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert("Entrada registrada con éxito");
                document.getElementById('form-entrada').reset();
                cargarInventario();
            } else {
                const err = await res.json();
                alert("Error: " + err.detail);
            }
        });

        // Evento Registrar Salida
        document.getElementById('form-salida').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                fecha: obtenerFechaActual(),
                codigo: document.getElementById('sal-codigo').value,
                cantidad: parseInt(document.getElementById('sal-cantidad').value),
                persona_contacto: document.getElementById('sal-destinatario').value,
                responsable: document.getElementById('sal-responsable').value
            };

            const res = await fetch(`${API_URL}/salidas`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert("Salida registrada con éxito");
                document.getElementById('form-salida').reset();
                cargarInventario();
            } else {
                const err = await res.json();
                alert("Error: " + err.detail);
            }
        });

        // Cargar datos al iniciar la página
        window.onload = cargarInventario;
    </script>
</body>
</html>
